<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케팅 정산 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-6xl mx-auto">

            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex items-center mb-6">
                    <i class="fas fa-calculator text-3xl text-blue-600 mr-3"></i>
                    <h1 class="text-3xl font-bold text-gray-800">마케팅 정산 계산기</h1>
                </div>

                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                    <p class="text-sm text-gray-700">
                        <i class="fas fa-info-circle mr-2"></i>
                        엑셀 파일을 업로드하면 고객사별 정산 금액을 자동으로 계산합니다.
                    </p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-file-excel mr-2"></i>엑셀 파일 선택
                    </label>
                    <input type="file" id="fileInput" accept=".xlsx,.xls"
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button id="analyzeBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                    <i class="fas fa-search mr-2"></i>파일 분석
                </button>

                <div id="loading" class="hidden text-center py-8">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                    <p class="text-gray-600">분석 중...</p>
                </div>

                <div id="error" class="hidden mt-6 bg-red-50 border-l-4 border-red-500 p-4">
                    <p class="text-red-700"></p>
                </div>
            </div>

            <!-- 정산율 확인 및 수정 -->
            <div id="rateSection" class="hidden bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-sliders-h mr-2"></i>정산율 확인 및 수정
                    </h2>
                    <button id="resetBtn"
                            class="text-sm text-gray-500 hover:text-blue-600 border border-gray-300 hover:border-blue-400 rounded px-3 py-1 transition">
                        <i class="fas fa-undo mr-1"></i>기본값으로 초기화
                    </button>
                </div>
                <p class="text-sm text-gray-500 mb-4">
                    수수료율 기준으로 정산율이 자동 설정됩니다. 예외가 있는 항목만 직접 수정하세요.
                </p>

                <div class="overflow-x-auto mb-6">
                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">고객사</th>
                                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">매체사</th>
                                <th class="px-4 py-3 text-center font-medium text-gray-500 uppercase tracking-wider w-28">수수료율</th>
                                <th class="px-4 py-3 text-center font-medium text-gray-500 uppercase tracking-wider w-36">정산율 (%)</th>
                            </tr>
                        </thead>
                        <tbody id="rateTableBody" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>

                <button id="calculateBtn"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                    <i class="fas fa-calculator mr-2"></i>정산 계산하기
                </button>
            </div>

            <!-- 결과 -->
            <div id="results" class="hidden">
                <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-chart-bar mr-2"></i>정산 결과
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg p-6 text-white">
                            <p class="text-sm opacity-90 mb-1">전체 광고비</p>
                            <p class="text-3xl font-bold" id="totalAdCost">0원</p>
                        </div>
                        <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-lg p-6 text-white">
                            <p class="text-sm opacity-90 mb-1">전체 정산 금액</p>
                            <p class="text-3xl font-bold" id="totalSettlement">0원</p>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">순위</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">고객사 계정명</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">광고비 합계</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">정산 금액</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <div id="detailsCard" class="hidden bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-list mr-2"></i>상세 내역
                    </h3>
                    <div id="detailsContent"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const fileInput  = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const calculateBtn = document.getElementById('calculateBtn');
        const resetBtn   = document.getElementById('resetBtn');
        const loading    = document.getElementById('loading');
        const error      = document.getElementById('error');
        const rateSection = document.getElementById('rateSection');
        const results    = document.getElementById('results');

        let parsedRows = null;
        let rowMeta = new Map();

        analyzeBtn.addEventListener('click', handleAnalyze);
        calculateBtn.addEventListener('click', handleCalculate);
        resetBtn.addEventListener('click', () => resetSettlementRates());

        async function handleAnalyze() {
            const file = fileInput.files[0];
            if (!file) { showError('파일을 선택해주세요.'); return; }
            if (!file.name.match(/\.(xlsx|xls)$/)) {
                showError('엑셀 파일(.xlsx, .xls)만 업로드 가능합니다.');
                return;
            }

            error.classList.add('hidden');
            results.classList.add('hidden');
            rateSection.classList.add('hidden');
            loading.classList.remove('hidden');
            analyzeBtn.disabled = true;

            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                parsedRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                rowMeta = buildRowMeta(parsedRows);
                renderRateTable(rowMeta);
                rateSection.classList.remove('hidden');
            } catch (err) {
                showError('파일 처리 중 오류가 발생했습니다: ' + err.message);
            } finally {
                loading.classList.add('hidden');
                analyzeBtn.disabled = false;
            }
        }

        function makeKey(accountName, media) {
            return accountName + '|||' + media;
        }

        function readRow(row) {
            if (!row || row.length < 11) return null;
            const media       = row[0];   // A열: 매체사
            const accountName = row[6];   // G열: 계정명(고객사)
            const amount      = parseFloat(row[9]);   // J열: 합계금액(광고비)
            const feeRate     = parseFloat(row[10]);  // K열: 수수료율
            if (!media || !accountName || accountName === '-' ||
                isNaN(amount) || isNaN(feeRate)) return null;
            if (typeof media === 'string' && media.includes('합')) return null;
            return { media, accountName, amount, feeRate };
        }

        function defaultSettlePct(feeRate) {
            if (Math.abs(feeRate - 0.09) < 0.001) return 5;
            return 10;
        }

        function buildRowMeta(rows) {
            const meta = new Map();
            for (let i = 3; i < rows.length; i++) {
                const r = readRow(rows[i]);
                if (!r) continue;
                const key = makeKey(r.accountName, r.media);
                if (meta.has(key)) continue;
                meta.set(key, {
                    accountName: r.accountName,
                    media: r.media,
                    feeRate: r.feeRate,
                    defaultSettlePct: defaultSettlePct(r.feeRate)
                });
            }
            return meta;
        }

        function renderRateTable(meta) {
            const tbody = document.getElementById('rateTableBody');
            tbody.innerHTML = '';
            let prevAccount = null;

            for (const [key, { accountName, media, feeRate, defaultSettlePct }] of meta) {
                const feeRatePct = Math.round(feeRate * 100);
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';

                const accountTd = document.createElement('td');
                accountTd.className = 'px-4 py-2.5 text-sm';
                if (accountName !== prevAccount) {
                    accountTd.className += ' font-semibold text-gray-800 border-t-2 border-gray-100';
                    accountTd.textContent = accountName;
                    prevAccount = accountName;
                } else {
                    accountTd.className += ' text-gray-400';
                    accountTd.textContent = '↳';
                }

                const mediaTd = document.createElement('td');
                mediaTd.className = 'px-4 py-2.5 text-sm text-gray-700';
                mediaTd.textContent = media;

                const feeTd = document.createElement('td');
                feeTd.className = 'px-4 py-2.5 text-center';
                const badge = document.createElement('span');
                badge.className = feeRatePct === 9
                    ? 'px-2 py-1 rounded-full text-xs font-bold bg-purple-100 text-purple-700'
                    : 'px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700';
                badge.textContent = feeRatePct + '%';
                feeTd.appendChild(badge);

                const settleTd = document.createElement('td');
                settleTd.className = 'px-4 py-2.5 text-center';
                const input = document.createElement('input');
                input.type = 'number';
                input.min = '0';
                input.max = '100';
                input.step = '0.1';
                input.value = defaultSettlePct;
                input.dataset.key = key;
                input.className = 'settle-input w-20 border border-gray-300 rounded px-2 py-1 text-sm text-right focus:outline-none focus:ring-2 focus:ring-green-400';
                const unit = document.createElement('span');
                unit.className = 'ml-1 text-sm text-gray-500';
                unit.textContent = '%';
                settleTd.appendChild(input);
                settleTd.appendChild(unit);

                tr.appendChild(accountTd);
                tr.appendChild(mediaTd);
                tr.appendChild(feeTd);
                tr.appendChild(settleTd);
                tbody.appendChild(tr);
            }
        }

        function resetSettlementRates() {
            document.querySelectorAll('.settle-input').forEach(input => {
                const meta = rowMeta.get(input.dataset.key);
                if (meta) input.value = meta.defaultSettlePct;
            });
        }

        function handleCalculate() {
            if (!parsedRows) { showError('먼저 파일을 분석해주세요.'); return; }

            const settleRates = new Map();
            for (const input of document.querySelectorAll('.settle-input')) {
                const val = parseFloat(input.value);
                const meta = rowMeta.get(input.dataset.key);
                if (isNaN(val) || val < 0 || val > 100) {
                    showError('"' + (meta ? meta.accountName + ' / ' + meta.media : '') + '"의 정산율은 0~100 사이의 값을 입력해주세요.');
                    return;
                }
                settleRates.set(input.dataset.key, val / 100);
            }

            error.classList.add('hidden');
            results.classList.add('hidden');

            try {
                displayResults(calculateSettlement(parsedRows, settleRates));
            } catch (err) {
                showError('계산 중 오류가 발생했습니다: ' + err.message);
            }
        }

        function calculateSettlement(rows, settleRates) {
            const accountMap = new Map();

            for (let i = 3; i < rows.length; i++) {
                const r = readRow(rows[i]);
                if (!r) continue;

                const key = makeKey(r.accountName, r.media);
                const settlementRate = settleRates.get(key) ?? defaultSettlePct(r.feeRate) / 100;
                const settlement = r.amount * settlementRate;

                if (!accountMap.has(r.accountName)) {
                    accountMap.set(r.accountName, {
                        accountName: r.accountName,
                        totalAmount: 0,
                        totalSettlement: 0,
                        details: []
                    });
                }
                const acc = accountMap.get(r.accountName);
                acc.totalAmount += r.amount;
                acc.totalSettlement += settlement;
                acc.details.push({
                    media: r.media,
                    feeRatePct: Math.round(r.feeRate * 100),
                    settlePct: settlementRate * 100,
                    amount: r.amount,
                    settlement
                });
            }

            const accounts = Array.from(accountMap.values())
                .sort((a, b) => b.totalSettlement - a.totalSettlement);

            return {
                accounts,
                totalAdCost: accounts.reduce((s, a) => s + a.totalAmount, 0),
                totalSettlement: accounts.reduce((s, a) => s + a.totalSettlement, 0)
            };
        }

        function displayResults(data) {
            document.getElementById('totalAdCost').textContent =
                Math.floor(data.totalAdCost).toLocaleString('ko-KR') + '원';
            document.getElementById('totalSettlement').textContent =
                Math.floor(data.totalSettlement).toLocaleString('ko-KR') + '원';

            const tbody = document.getElementById('summaryTableBody');
            tbody.innerHTML = '';
            data.accounts.forEach((acc, i) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 cursor-pointer';
                row.onclick = () => showDetails(acc);
                const rankClass = i === 0 ? 'text-yellow-600 font-bold' :
                                  i === 1 ? 'text-gray-400 font-bold' :
                                  i === 2 ? 'text-orange-600 font-bold' : '';
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap"><span class="${rankClass}">${i + 1}</span></td>
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${escapeHtml(acc.accountName)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-gray-900">${Math.floor(acc.totalAmount).toLocaleString('ko-KR')}원</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right font-bold text-green-600">${Math.floor(acc.totalSettlement).toLocaleString('ko-KR')}원</td>
                `;
                tbody.appendChild(row);
            });

            results.classList.remove('hidden');
            if (data.accounts.length > 0) showDetails(data.accounts[0]);
        }

        function showDetails(acc) {
            const detailsCard = document.getElementById('detailsCard');
            const detailsContent = document.getElementById('detailsContent');

            let html = `
                <div class="mb-4">
                    <h4 class="text-lg font-bold text-gray-800">${escapeHtml(acc.accountName)}</h4>
                    <p class="text-sm text-gray-600">총 광고비: ${Math.floor(acc.totalAmount).toLocaleString('ko-KR')}원</p>
                    <p class="text-sm font-bold text-green-600">총 정산액: ${Math.floor(acc.totalSettlement).toLocaleString('ko-KR')}원</p>
                </div>
                <div class="space-y-2">
            `;

            acc.details.forEach(d => {
                const feeBadge = d.feeRatePct === 9
                    ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700';
                const settlePct = d.settlePct.toFixed(1).replace(/\.0$/, '') + '%';
                html += `
                    <div class="border rounded-lg p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-medium text-gray-800">${escapeHtml(d.media)}</span>
                            <div class="flex gap-2">
                                <span class="px-2 py-1 rounded-full text-xs font-bold ${feeBadge}">수수료 ${d.feeRatePct}%</span>
                                <span class="px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">정산 ${settlePct}</span>
                            </div>
                        </div>
                        <div class="text-sm text-gray-600">
                            <p>광고비: ${Math.floor(d.amount).toLocaleString('ko-KR')}원</p>
                            <p class="font-bold text-green-600">정산액: ${Math.floor(d.settlement).toLocaleString('ko-KR')}원</p>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            detailsContent.innerHTML = html;
            detailsCard.classList.remove('hidden');
        }

        function showError(message) {
            error.querySelector('p').textContent = message;
            error.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
