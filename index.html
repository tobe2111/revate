<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케팅 정산 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen py-8 px-4">
        <div class="max-w-6xl mx-auto">

            <!-- 1단계: 파일 업로드 -->
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex items-center mb-6">
                    <i class="fas fa-calculator text-3xl text-blue-600 mr-3"></i>
                    <h1 class="text-3xl font-bold text-gray-800">마케팅 정산 계산기</h1>
                </div>

                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                    <p class="text-sm text-gray-700">
                        <i class="fas fa-info-circle mr-2"></i>
                        엑셀 파일을 업로드하면 고객사별 수수료율과 정산율을 설정한 뒤 금액을 계산합니다.
                    </p>
                </div>

                <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-6">
                    <h2 class="text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-sliders-h mr-2"></i>수수료율별 기본 정산율 (자동 입력 기준)
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">
                                수수료율 <span class="font-bold text-purple-700">9%</span> 적용 정산율 (%)
                            </label>
                            <input type="number" id="rate9Input" value="5" min="0" max="100" step="0.1"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">
                                수수료율 <span class="font-bold text-blue-700">14%</span> 적용 정산율 (%)
                            </label>
                            <input type="number" id="rate14Input" value="10" min="0" max="100" step="0.1"
                                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-file-excel mr-2"></i>엑셀 파일 선택
                    </label>
                    <input type="file" id="fileInput" accept=".xlsx,.xls"
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button id="analyzeBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                    <i class="fas fa-search mr-2"></i>파일 분석
                </button>

                <div id="loading" class="hidden text-center py-8">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                    <p class="text-gray-600">분석 중...</p>
                </div>

                <div id="error" class="hidden mt-6 bg-red-50 border-l-4 border-red-500 p-4">
                    <p class="text-red-700"></p>
                </div>
            </div>

            <!-- 2단계: 회사별 수수료율 / 정산율 설정 -->
            <div id="companyRatesSection" class="hidden bg-white rounded-lg shadow-lg p-6 mb-6">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-building mr-2"></i>고객사별 수수료율 · 정산율 설정
                    </h2>
                    <button id="resetRatesBtn"
                            class="text-sm text-gray-500 hover:text-blue-600 border border-gray-300 hover:border-blue-400 rounded px-3 py-1 transition">
                        <i class="fas fa-undo mr-1"></i>기본값으로 초기화
                    </button>
                </div>
                <p class="text-sm text-gray-500 mb-4">
                    수수료율을 입력하면 정산율이 자동으로 채워집니다. 정산율은 직접 수정도 가능합니다.
                </p>

                <div class="overflow-x-auto mb-6">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">고객사 계정명</th>
                                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-36">수수료율 (%)</th>
                                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-36">정산율 (%)</th>
                            </tr>
                        </thead>
                        <tbody id="companyRatesBody" class="bg-white divide-y divide-gray-200">
                        </tbody>
                    </table>
                </div>

                <button id="calculateBtn"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center">
                    <i class="fas fa-calculator mr-2"></i>정산 계산하기
                </button>
            </div>

            <!-- 3단계: 결과 -->
            <div id="results" class="hidden">
                <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-chart-bar mr-2"></i>정산 결과
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg p-6 text-white">
                            <p class="text-sm opacity-90 mb-1">전체 광고비</p>
                            <p class="text-3xl font-bold" id="totalAdCost">0원</p>
                        </div>
                        <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-lg p-6 text-white">
                            <p class="text-sm opacity-90 mb-1">전체 정산 금액</p>
                            <p class="text-3xl font-bold" id="totalSettlement">0원</p>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">순위</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">고객사 계정명</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">광고비 합계</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">수수료율</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">정산율</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">정산 금액</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody" class="bg-white divide-y divide-gray-200">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="detailsCard" class="hidden bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-list mr-2"></i>상세 내역
                    </h3>
                    <div id="detailsContent"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const calculateBtn = document.getElementById('calculateBtn');
        const resetRatesBtn = document.getElementById('resetRatesBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const results = document.getElementById('results');
        const companyRatesSection = document.getElementById('companyRatesSection');

        let parsedRows = null;
        // Map<companyName, { dominantFeeRate: number }>
        let companyMeta = new Map();

        analyzeBtn.addEventListener('click', handleAnalyze);
        calculateBtn.addEventListener('click', handleCalculate);
        resetRatesBtn.addEventListener('click', resetRates);

        async function handleAnalyze() {
            const file = fileInput.files[0];
            if (!file) { showError('파일을 선택해주세요.'); return; }
            if (!file.name.match(/\.(xlsx|xls)$/)) {
                showError('엑셀 파일(.xlsx, .xls)만 업로드 가능합니다.');
                return;
            }

            const rate9Val = parseFloat(document.getElementById('rate9Input').value);
            const rate14Val = parseFloat(document.getElementById('rate14Input').value);
            if (isNaN(rate9Val) || rate9Val < 0 || rate9Val > 100) {
                showError('수수료율 9% 정산율은 0~100 사이의 값을 입력해주세요.');
                return;
            }
            if (isNaN(rate14Val) || rate14Val < 0 || rate14Val > 100) {
                showError('수수료율 14% 정산율은 0~100 사이의 값을 입력해주세요.');
                return;
            }

            error.classList.add('hidden');
            results.classList.add('hidden');
            companyRatesSection.classList.add('hidden');
            loading.classList.remove('hidden');
            analyzeBtn.disabled = true;

            try {
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                parsedRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                companyMeta = buildCompanyMeta(parsedRows);
                renderCompanyRatesTable(companyMeta, rate9Val, rate14Val);
                companyRatesSection.classList.remove('hidden');
            } catch (err) {
                showError('파일 처리 중 오류가 발생했습니다: ' + err.message);
            } finally {
                loading.classList.add('hidden');
                analyzeBtn.disabled = false;
            }
        }

        // 각 회사의 지배적 수수료율(엑셀 기준)만 추출
        function buildCompanyMeta(rows) {
            const raw = new Map();

            for (let i = 3; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 10) continue;
                const media = row[0];
                const accountName = row[5];
                const amount = parseFloat(row[8]);
                const feeRate = parseFloat(row[9]);
                if (!media || !accountName || accountName === '-' ||
                    isNaN(amount) || isNaN(feeRate)) continue;
                if (typeof media === 'string' && media.includes('합')) continue;

                if (!raw.has(accountName)) {
                    raw.set(accountName, { amount9: 0, amount14: 0 });
                }
                const m = raw.get(accountName);
                if (Math.abs(feeRate - 0.09) < 0.001) {
                    m.amount9 += amount;
                } else {
                    m.amount14 += amount;
                }
            }

            const result = new Map();
            for (const [company, { amount9, amount14 }] of raw) {
                result.set(company, { dominantFeeRate: amount9 >= amount14 ? 9 : 14 });
            }
            return result;
        }

        function getSettlementRate(feeRateVal, rate9Val, rate14Val) {
            if (Math.abs(feeRateVal - 9) < 0.001) return rate9Val;
            if (Math.abs(feeRateVal - 14) < 0.001) return rate14Val;
            return '';
        }

        function renderCompanyRatesTable(meta, rate9Val, rate14Val) {
            const tbody = document.getElementById('companyRatesBody');
            tbody.innerHTML = '';

            for (const [company, { dominantFeeRate }] of meta) {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';

                // 고객사명
                const nameTd = document.createElement('td');
                nameTd.className = 'px-4 py-3 text-sm font-medium text-gray-800';
                nameTd.textContent = company;

                // 수수료율 입력
                const feeTd = document.createElement('td');
                feeTd.className = 'px-4 py-3 text-center';

                const feeInput = document.createElement('input');
                feeInput.type = 'number';
                feeInput.min = '0';
                feeInput.max = '100';
                feeInput.step = '0.1';
                feeInput.value = dominantFeeRate;
                feeInput.dataset.company = company;
                feeInput.className = 'fee-rate-input w-20 border border-gray-300 rounded px-2 py-1 text-sm text-right focus:outline-none focus:ring-2 focus:ring-purple-400';

                const feeUnit = document.createElement('span');
                feeUnit.className = 'ml-1 text-sm text-gray-500';
                feeUnit.textContent = '%';

                feeTd.appendChild(feeInput);
                feeTd.appendChild(feeUnit);

                // 정산율 입력 (수수료율에 따라 자동 채움)
                const settleTd = document.createElement('td');
                settleTd.className = 'px-4 py-3 text-center';

                const settleInput = document.createElement('input');
                settleInput.type = 'number';
                settleInput.min = '0';
                settleInput.max = '100';
                settleInput.step = '0.1';
                settleInput.value = getSettlementRate(dominantFeeRate, rate9Val, rate14Val);
                settleInput.dataset.company = company;
                settleInput.className = 'settle-rate-input w-20 border border-gray-300 rounded px-2 py-1 text-sm text-right focus:outline-none focus:ring-2 focus:ring-green-400';

                const settleUnit = document.createElement('span');
                settleUnit.className = 'ml-1 text-sm text-gray-500';
                settleUnit.textContent = '%';

                settleTd.appendChild(settleInput);
                settleTd.appendChild(settleUnit);

                // 수수료율 변경 시 정산율 자동 입력
                feeInput.addEventListener('input', () => {
                    const feeVal = parseFloat(feeInput.value);
                    const r9 = parseFloat(document.getElementById('rate9Input').value);
                    const r14 = parseFloat(document.getElementById('rate14Input').value);
                    const auto = getSettlementRate(feeVal, r9, r14);
                    if (auto !== '') settleInput.value = auto;
                });

                tr.appendChild(nameTd);
                tr.appendChild(feeTd);
                tr.appendChild(settleTd);
                tbody.appendChild(tr);
            }
        }

        function resetRates() {
            const rate9Val = parseFloat(document.getElementById('rate9Input').value);
            const rate14Val = parseFloat(document.getElementById('rate14Input').value);

            document.querySelectorAll('.fee-rate-input').forEach(feeInput => {
                const company = feeInput.dataset.company;
                const meta = companyMeta.get(company);
                if (!meta) return;
                feeInput.value = meta.dominantFeeRate;

                const settleInput = feeInput.closest('tr').querySelector('.settle-rate-input');
                if (settleInput) {
                    settleInput.value = getSettlementRate(meta.dominantFeeRate, rate9Val, rate14Val);
                }
            });
        }

        function handleCalculate() {
            if (!parsedRows) { showError('먼저 파일을 분석해주세요.'); return; }

            const companyFeeRates = new Map();
            const companySettleRates = new Map();

            const rows = document.querySelectorAll('#companyRatesBody tr');
            for (const row of rows) {
                const feeInput = row.querySelector('.fee-rate-input');
                const settleInput = row.querySelector('.settle-rate-input');
                const company = feeInput.dataset.company;

                const feeVal = parseFloat(feeInput.value);
                const settleVal = parseFloat(settleInput.value);

                if (isNaN(feeVal) || feeVal < 0 || feeVal > 100) {
                    showError('"' + company + '"의 수수료율은 0~100 사이의 값을 입력해주세요.');
                    return;
                }
                if (isNaN(settleVal) || settleVal < 0 || settleVal > 100) {
                    showError('"' + company + '"의 정산율은 0~100 사이의 값을 입력해주세요.');
                    return;
                }

                companyFeeRates.set(company, feeVal);
                companySettleRates.set(company, settleVal / 100);
            }

            error.classList.add('hidden');
            results.classList.add('hidden');

            try {
                const calculatedData = calculateSettlement(parsedRows, companyFeeRates, companySettleRates);
                displayResults(calculatedData);
            } catch (err) {
                showError('계산 중 오류가 발생했습니다: ' + err.message);
            }
        }

        function calculateSettlement(rows, companyFeeRates, companySettleRates) {
            const accountMap = new Map();

            for (let i = 3; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 10) continue;

                const media = row[0];
                const accountName = row[5];
                const amount = parseFloat(row[8]);
                const feeRate = parseFloat(row[9]);

                if (!media || !accountName || accountName === '-' ||
                    isNaN(amount) || isNaN(feeRate)) continue;
                if (typeof media === 'string' && media.includes('합')) continue;

                const appliedFeeRate = companyFeeRates.get(accountName) ?? (feeRate * 100);
                const settlementRate = companySettleRates.get(accountName) ?? 0;
                const settlement = amount * settlementRate;

                if (!accountMap.has(accountName)) {
                    accountMap.set(accountName, {
                        accountName,
                        appliedFeeRate,
                        settlementRate,
                        totalAmount: 0,
                        totalSettlement: 0,
                        details: []
                    });
                }

                const account = accountMap.get(accountName);
                account.totalAmount += amount;
                account.totalSettlement += settlement;
                account.details.push({ media, amount, settlement });
            }

            const accounts = Array.from(accountMap.values())
                .sort((a, b) => b.totalSettlement - a.totalSettlement);

            const totalAdCost = accounts.reduce((sum, acc) => sum + acc.totalAmount, 0);
            const totalSettlement = accounts.reduce((sum, acc) => sum + acc.totalSettlement, 0);

            return { accounts, totalAdCost, totalSettlement };
        }

        function displayResults(data) {
            document.getElementById('totalAdCost').textContent =
                Math.floor(data.totalAdCost).toLocaleString('ko-KR') + '원';
            document.getElementById('totalSettlement').textContent =
                Math.floor(data.totalSettlement).toLocaleString('ko-KR') + '원';

            const tbody = document.getElementById('summaryTableBody');
            tbody.innerHTML = '';

            data.accounts.forEach((account, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 cursor-pointer';
                row.onclick = () => showDetails(account);

                const rankClass = index === 0 ? 'text-yellow-600 font-bold' :
                                  index === 1 ? 'text-gray-400 font-bold' :
                                  index === 2 ? 'text-orange-600 font-bold' : '';

                const feeDisplay = account.appliedFeeRate.toFixed(1).replace(/\.0$/, '') + '%';
                const settleDisplay = (account.settlementRate * 100).toFixed(1).replace(/\.0$/, '') + '%';

                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="${rankClass}">${index + 1}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">
                        ${escapeHtml(account.accountName)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-gray-900">
                        ${Math.floor(account.totalAmount).toLocaleString('ko-KR')}원
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <span class="px-2 py-1 rounded-full text-xs font-bold bg-purple-100 text-purple-700">${feeDisplay}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <span class="px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">${settleDisplay}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right font-bold text-green-600">
                        ${Math.floor(account.totalSettlement).toLocaleString('ko-KR')}원
                    </td>
                `;
                tbody.appendChild(row);
            });

            results.classList.remove('hidden');
            if (data.accounts.length > 0) {
                showDetails(data.accounts[0]);
            }
        }

        function showDetails(account) {
            const detailsCard = document.getElementById('detailsCard');
            const detailsContent = document.getElementById('detailsContent');

            const feeDisplay = account.appliedFeeRate.toFixed(1).replace(/\.0$/, '') + '%';
            const settleDisplay = (account.settlementRate * 100).toFixed(1).replace(/\.0$/, '') + '%';

            let html = `
                <div class="mb-4">
                    <h4 class="text-lg font-bold text-gray-800">${escapeHtml(account.accountName)}</h4>
                    <p class="text-sm text-gray-600">총 광고비: ${Math.floor(account.totalAmount).toLocaleString('ko-KR')}원</p>
                    <p class="text-sm text-gray-600">
                        수수료율: <span class="font-bold text-purple-700">${feeDisplay}</span>
                        &nbsp;/&nbsp;
                        정산율: <span class="font-bold text-green-600">${settleDisplay}</span>
                    </p>
                    <p class="text-sm font-bold text-green-600">총 정산액: ${Math.floor(account.totalSettlement).toLocaleString('ko-KR')}원</p>
                </div>
                <div class="space-y-2">
            `;

            account.details.forEach(detail => {
                html += `
                    <div class="border rounded-lg p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-medium text-gray-800">${escapeHtml(detail.media)}</span>
                            <div class="flex gap-2">
                                <span class="px-2 py-1 rounded-full text-xs font-bold bg-purple-100 text-purple-700">수수료 ${feeDisplay}</span>
                                <span class="px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700">정산 ${settleDisplay}</span>
                            </div>
                        </div>
                        <div class="text-sm text-gray-600">
                            <p>광고비: ${Math.floor(detail.amount).toLocaleString('ko-KR')}원</p>
                            <p class="font-bold text-green-600">정산액: ${Math.floor(detail.settlement).toLocaleString('ko-KR')}원</p>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            detailsContent.innerHTML = html;
            detailsCard.classList.remove('hidden');
        }

        function showError(message) {
            error.querySelector('p').textContent = message;
            error.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
